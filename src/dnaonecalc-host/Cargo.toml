[package]
name = "dnaonecalc-host"
version = "0.1.0"
edition = "2021"

[features]
default = []
oxfml-live = ["dep:oxfml_core"]

[dependencies]
leptos = { version = "0.8.17", default-features = false, features = ["ssr"] }
web-sys = { version = "0.3", features = ["HtmlTextAreaElement", "HtmlElement", "InputEvent", "KeyboardEvent"] }
wasm-bindgen = "0.2"
oxfml_core = { path = "../../../OxFml/crates/oxfml_core", optional = true }
